name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build, Test, and Publish Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Add coverage to job summary
        run: |
          node <<'NODE'
          const fs = require('node:fs')

          const summaryPath = 'coverage/coverage-summary.json'
          if (!fs.existsSync(summaryPath)) {
            console.log('coverage-summary.json not found')
            process.exit(0)
          }

          const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'))
          const total = summary.total ?? {}

          const toPct = (value) => {
            const numeric = Number(value)
            return Number.isFinite(numeric) ? numeric.toFixed(2) : '0.00'
          }

          const markdown = [
            '## Coverage Report',
            '',
            '| Metric | % |',
            '| --- | --- |',
            `| Lines | ${toPct(total.lines?.pct)}% |`,
            `| Statements | ${toPct(total.statements?.pct)}% |`,
            `| Functions | ${toPct(total.functions?.pct)}% |`,
            `| Branches | ${toPct(total.branches?.pct)}% |`,
            ''
          ].join('\n')

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, markdown)
          fs.writeFileSync('coverage-summary.md', markdown)
          NODE

      - name: Publish coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: error

      - name: Publish build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-output
          path: .output
          include-hidden-files: true
          if-no-files-found: error

  deploy-cloudflare:
    name: Manual Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch'
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nuxt-output
          path: .output

      - name: Validate deployment settings
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CF_API_TOKEN secret is required."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "CF_ACCOUNT_ID secret is required."
            exit 1
          fi
          if [ -z "$CF_PROJECT_NAME" ]; then
            echo "CF_PROJECT_NAME secret is required."
            exit 1
          fi

      - name: Verify Cloudflare identity
        run: pnpm dlx wrangler whoami

      - name: Deploy to Cloudflare project
        run: pnpm dlx wrangler --cwd .output deploy --name "$CF_PROJECT_NAME"
