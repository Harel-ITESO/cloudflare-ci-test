name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build, Test, and Publish Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Add coverage to job summary
        run: |
          node --input-type=module -e "import fs from 'node:fs'; const summaryPath = 'coverage/coverage-summary.json'; if (!fs.existsSync(summaryPath)) { console.log('coverage-summary.json not found'); process.exit(0); } const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8')); const total = summary.total ?? {}; const row = `| ${total.lines?.pct ?? 0}% | ${total.statements?.pct ?? 0}% | ${total.functions?.pct ?? 0}% | ${total.branches?.pct ?? 0}% |`; const md = ['## Coverage Report', '', '| Lines | Statements | Functions | Branches |', '| --- | --- | --- | --- |', row, ''].join('\n'); fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);"

      - name: Publish coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: error

      - name: Publish build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-output
          path: .output/**
          include-hidden-files: true
          if-no-files-found: error
